<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="bP8hbhxR0YcFd7UDp3XYOEvfYMaARes6sGUG40bluqY">

<title>كعكوز إكسبرس</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
scroll-behavior:smooth;
}

body{

background:
linear-gradient(180deg,#faf8f3,#f5efe4,#ffffff);

overflow-x:hidden;

color:#333;

}

/* إطار ذهبي مضيء */

body::before{

content:"";

position:fixed;

top:8px;

left:8px;

right:8px;

bottom:8px;

border:3px solid #d4af37;

border-radius:18px;

pointer-events:none;

z-index:99999;

box-shadow:

0 0 10px #d4af37,

0 0 25px rgba(212,175,55,.8),

0 0 45px rgba(212,175,55,.6);

animation:borderGlow 3s infinite alternate;

}

/* زخارف الزوايا */

.corner{

position:fixed;

width:45px;

height:45px;

border:3px solid #d4af37;

z-index:99998;

pointer-events:none;

box-shadow:0 0 12px gold;

}

.tl{

top:10px;

left:10px;

border-right:none;

border-bottom:none;

border-radius:18px 0 0 0;

}

.tr{

top:10px;

right:10px;

border-left:none;

border-bottom:none;

border-radius:0 18px 0 0;

}

.bl{

bottom:10px;

left:10px;

border-right:none;

border-top:none;

border-radius:0 0 0 18px;

}

.br{

bottom:10px;

right:10px;

border-left:none;

border-top:none;

border-radius:0 0 18px 0;

}

@keyframes borderGlow{

0%{

box-shadow:

0 0 8px #d4af37,

0 0 20px rgba(212,175,55,.5);

}

100%{

box-shadow:

0 0 18px gold,

0 0 35px gold,

0 0 60px rgba(255,215,0,.8);

}

}

/* شاشة البداية */

#loader{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:#111;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:999999;

animation:hideLoader .8s forwards;

animation-delay:2.3s;

}

#loader h1{

font-size:42px;

color:#fff;

text-shadow:

0 0 12px gold,

0 0 30px gold;

}

#loader p{

margin-top:20px;

color:#ddd;

font-size:18px;

}

@keyframes hideLoader{

to{

opacity:0;

visibility:hidden;

}

}

header{

position:sticky;

top:0;

z-index:999;

padding:22px;

background:

linear-gradient(90deg,#5b2f12,#8B4513,#5b2f12);

color:#fff;

font-size:30px;

font-weight:800;

text-align:center;

letter-spacing:1px;

text-shadow:

0 0 10px gold,

0 0 25px gold;

box-shadow:

0 8px 20px rgba(0,0,0,.25);

  
}


/* الشريط المتحرك */

.newsBar{
background:linear-gradient(90deg,#d4af37,#f5d77c,#d4af37);
color:#4a2a0c;
overflow:hidden;
padding:12px 0;
font-size:18px;
font-weight:700;
white-space:nowrap;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.newsText{
display:inline-block;
padding-right:100%;
animation:newsMove 22s linear infinite;
}

@keyframes newsMove{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-100%);
}

}

/* صورة الغلاف */

.banner{

overflow:hidden;

}

.banner img{

width:100%;

display:block;

transition:.8s;

border-bottom:5px solid #d4af37;

box-shadow:0 12px 30px rgba(0,0,0,.25);

}

.banner img:hover{

transform:scale(1.03);

}

/* المحتوى */

.hero{

padding:45px 25px;

display:flex;

justify-content:space-between;

align-items:center;

gap:35px;

flex-wrap:wrap;

}

.left,.right{

flex:1;

min-width:300px;

animation:fadeUp 1s ease;

}

/* البطاقات */

.right{

background:rgba(255,255,255,.82);

backdrop-filter:blur(14px);

padding:28px;

border-radius:22px;

border:1px solid rgba(255,255,255,.5);

box-shadow:

0 15px 35px rgba(0,0,0,.15),

0 0 20px rgba(212,175,55,.18);

transition:.4s;

}

.right:hover{

transform:translateY(-8px);

box-shadow:

0 20px 40px rgba(0,0,0,.18),

0 0 30px rgba(212,175,55,.45);

}

.left h2{

font-size:40px;

color:#6d3b1e;

margin-bottom:20px;

}

.left p{

font-size:22px;

line-height:2;

}

.right h3{

font-size:30px;

color:#6d3b1e;

margin-bottom:15px;

}

.right ul{

list-style:none;

font-size:21px;

line-height:2.2;

}

/* الأزرار */

.buttons{

text-align:center;

margin:45px 0;

}

button,a.btn{

display:inline-block;

padding:18px 40px;

margin:12px;

border:none;

border-radius:60px;

font-size:22px;

font-weight:bold;

cursor:pointer;

text-decoration:none;

color:#fff;

transition:.35s;

box-shadow:0 10px 25px rgba(0,0,0,.2);

}

.menuBtn{

background:linear-gradient(45deg,#6d3b1e,#b46d2a);

}

.callBtn{

background:linear-gradient(45deg,#0c8c42,#20c86a);

}

button:hover,a.btn:hover{

transform:translateY(-5px) scale(1.05);

box-shadow:

0 0 15px gold,

0 0 30px rgba(255,215,0,.5);

}


  /* المنيو */

#menu{

display:none;

padding:30px;

text-align:center;

animation:fadeUp .8s ease;

}

#menu img{

width:95%;

max-width:900px;

border-radius:22px;

box-shadow:

0 20px 40px rgba(0,0,0,.30),

0 0 20px rgba(212,175,55,.45);

transition:.5s;

}

#menu img:hover{

transform:scale(1.02);

}

/* آراء العملاء */

.reviews{

padding:60px 20px;

text-align:center;

}

.reviews h2{

font-size:34px;

color:#6d3b1e;

margin-bottom:35px;

}

.reviewContainer{

display:flex;

gap:25px;

justify-content:center;

flex-wrap:wrap;

}

.review{

background:rgba(255,255,255,.85);

backdrop-filter:blur(12px);

width:320px;

padding:25px;

border-radius:20px;

box-shadow:

0 12px 30px rgba(0,0,0,.15),

0 0 15px rgba(212,175,55,.25);

transition:.4s;

}

.review:hover{

transform:translateY(-8px);

box-shadow:

0 20px 35px rgba(0,0,0,.20),

0 0 25px gold;

}

.review .stars{

font-size:24px;

margin-bottom:12px;

}

.review h3{

color:#6d3b1e;

margin-bottom:10px;

}

.review p{

line-height:1.8;

font-size:18px;

}

footer{

margin-top:60px;

background:#1f1f1f;

color:white;

text-align:center;

padding:40px 20px;

line-height:2.2;

border-top:4px solid #d4af37;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.hero{

flex-direction:column;

}

.left h2{

font-size:30px;

}

.left p{

font-size:19px;

}

button,

a.btn{

width:90%;

}

.review{

width:100%;

}

}

</style>

<script>

function showMenu(){

var menu=document.getElementById("menu");

if(menu.style.display==="block"){

menu.style.display="none";

}else{

menu.style.display="block";

menu.scrollIntoView({

behavior:"smooth"

});

}

}

</script>

</head>
