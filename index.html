<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>كعكوز إكسبرس</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
background:#f8f2e8;
color:#3b2413;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.hero{
margin-top:20px;
background:#efe1c3;
border:5px solid #b88a32;
border-radius:25px;
overflow:hidden;
box-shadow:0 0 25px rgba(184,138,50,.35);
}
.header{
background:#6b3d1c;
padding:35px 20px;
text-align:center;
border-top:6px solid #d4af37;
border-bottom:6px solid #d4af37;
position:relative;
}

.header::before,
.header::after{
content:"❈ ❈ ❈";
color:#d4af37;
font-size:26px;
position:absolute;
top:50%;
transform:translateY(-50%);
}

.header::before{
left:20px;
}

.header::after{
right:20px;
}

.header h1{
font-size:48px;
color:#fff8e1;
text-shadow:2px 2px 6px #000;
margin:0;
}
  

.banner img{
width:100%;
display:block;
}

.welcome{
padding:40px 25px;
text-align:center;
}

.welcome h2{
font-size:45px;
color:#6b3515;
margin-bottom:25px;
}

.welcome p{
font-size:25px;
line-height:2;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<div class="header">

<h1>كعكوز إكسبرس</h1>

</div>

<div class="banner">

<img src="file_00000000144471f4852b37bfbefedc13.png">

</div>

<div class="welcome">

<h2>أهلاً وسهلاً بكم</h2>

<p>

في كعكوز إكسبرس نعيد إليكم نكهة الماضي، ونقدم وصفات أجدادنا بأصالة وجودة تليق بكم.

</p>

</div>

</div>

</div>

</body>

</html>
